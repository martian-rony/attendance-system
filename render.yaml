services:
  - type: web
    name: attendance-system
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      cd backend && npm install
      cd ../frontend && npm install && npm run build
    startCommand: node backend/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Install devDependencies (vite etc.) during build even though
      # NODE_ENV=production. Without this, `npm install` skips devDeps and
      # `vite build` fails with "vite: not found".
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: QR_CODE_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
